<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <g id="users-table">
    <rect x="50" y="50" width="300" height="500" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <rect x="50" y="50" width="300" height="30" fill="#1976d2"/>
    <text x="200" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Users</text>
    
    <text x="60" y="90" font-family="Arial" font-size="10" font-weight="bold">🔑 Id: integer (PK)</text>
    
    <text x="60" y="110" font-family="Arial" font-size="10">Username: varchar(50)</text>
    <text x="60" y="125" font-family="Arial" font-size="10">Email: varchar(255)</text>
    <text x="60" y="140" font-family="Arial" font-size="10">PasswordHash: varchar(60)</text>
    <text x="60" y="155" font-family="Arial" font-size="10">FirstName: varchar(100)</text>
    <text x="60" y="170" font-family="Arial" font-size="10">LastName: varchar(100)</text>
    <text x="60" y="185" font-family="Arial" font-size="10">PhoneNumber: varchar(50)</text>
    <text x="60" y="200" font-family="Arial" font-size="10">DateOfBirth: timestamp</text>
    <text x="60" y="215" font-family="Arial" font-size="10">Gender: integer</text>
    <text x="60" y="230" font-family="Arial" font-size="10">Address: varchar(255)</text>
    <text x="60" y="245" font-family="Arial" font-size="10">Oib: bigint</text>
    <text x="60" y="260" font-family="Arial" font-size="10">UserType: varchar(13)</text>
    <text x="60" y="275" font-family="Arial" font-size="10">SubscriptionType: integer</text>
    <text x="60" y="290" font-family="Arial" font-size="10">IsActive: boolean</text>
    <text x="60" y="305" font-family="Arial" font-size="10">CreatedAt: timestamp</text>
    <text x="60" y="320" font-family="Arial" font-size="10">UpdatedAt: timestamp</text>
    
    <line x1="60" y1="335" x2="340" y2="335" stroke="#4caf50" stroke-width="1"/>
    <text x="60" y="350" font-family="Arial" font-size="9" fill="#4caf50">MembershipNumber: varchar(50)</text>
    <text x="60" y="365" font-family="Arial" font-size="9" fill="#4caf50">EmergencyContactName: varchar(255)</text>
    <text x="60" y="380" font-family="Arial" font-size="9" fill="#4caf50">Height: numeric(5,2)</text>
    <text x="60" y="395" font-family="Arial" font-size="9" fill="#4caf50">Weight: numeric(5,2)</text>
    <text x="60" y="410" font-family="Arial" font-size="9" fill="#4caf50">MedicalNotes: varchar(1000)</text>
    
    <line x1="60" y1="425" x2="340" y2="425" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="440" font-family="Arial" font-size="9" fill="#ff9800">Specialization: integer</text>
    <text x="60" y="455" font-family="Arial" font-size="9" fill="#ff9800">YearsOfExperience: integer</text>
    <text x="60" y="470" font-family="Arial" font-size="9" fill="#ff9800">HourlyRate: numeric(8,2)</text>
    <text x="60" y="485" font-family="Arial" font-size="9" fill="#ff9800">Rating: numeric(3,2)</text>
    
    <line x1="60" y1="500" x2="340" y2="500" stroke="#9c27b0" stroke-width="1"/>
    <text x="60" y="515" font-family="Arial" font-size="9" fill="#9c27b0">EmployeeId: integer</text>
    <text x="60" y="530" font-family="Arial" font-size="9" fill="#9c27b0">Role: integer</text>
    <text x="60" y="545" font-family="Arial" font-size="9" fill="#9c27b0">Salary: numeric(10,2)</text>
  </g>

  <g id="subscriptions-table">
    <rect x="450" y="50" width="250" height="280" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <rect x="450" y="50" width="250" height="30" fill="#9c27b0"/>
    <text x="575" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Subscriptions</text>
    
    <text x="460" y="90" font-family="Arial" font-size="10" font-weight="bold">🔑 Id: integer (PK)</text>
    <text x="460" y="110" font-family="Arial" font-size="10" font-weight="bold">🔗 MemberId: integer (FK)</text>
    <text x="460" y="130" font-family="Arial" font-size="10">Type: integer</text>
    <text x="460" y="150" font-family="Arial" font-size="10">StartDate: timestamp</text>
    <text x="460" y="170" font-family="Arial" font-size="10">EndDate: timestamp</text>
    <text x="460" y="190" font-family="Arial" font-size="10">Price: numeric</text>
    <text x="460" y="210" font-family="Arial" font-size="10">Status: integer</text>
    <text x="460" y="230" font-family="Arial" font-size="10">PaymentMethod: integer</text>
    <text x="460" y="250" font-family="Arial" font-size="10">AutoRenewal: boolean</text>
    <text x="460" y="270" font-family="Arial" font-size="10">CreatedAt: timestamp</text>
    <text x="460" y="290" font-family="Arial" font-size="10">IsCancelled: boolean</text>
    <text x="460" y="310" font-family="Arial" font-size="10">IsDeleted: boolean</text>
  </g>

  <g id="trainermembers-table">
    <rect x="50" y="600" width="300" height="180" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <rect x="50" y="600" width="300" height="30" fill="#ff9800"/>
    <text x="200" y="620" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">TrainerMembers</text>
    
    <text x="60" y="640" font-family="Arial" font-size="10" font-weight="bold">🔑 Id: integer (PK)</text>
    <text x="60" y="660" font-family="Arial" font-size="10" font-weight="bold">🔗 TrainerId: integer (FK)</text>
    <text x="60" y="680" font-family="Arial" font-size="10" font-weight="bold">🔗 MemberId: integer (FK)</text>
    <text x="60" y="700" font-family="Arial" font-size="10">StartDate: timestamp</text>
    <text x="60" y="720" font-family="Arial" font-size="10">EndDate: timestamp</text>
    <text x="60" y="740" font-family="Arial" font-size="10">SessionsPerWeek: integer</text>
    <text x="60" y="760" font-family="Arial" font-size="10">IsActive: boolean</text>
  </g>

  <g id="refreshtokens-table">
    <rect x="450" y="380" width="250" height="150" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
    <rect x="450" y="380" width="250" height="30" fill="#4caf50"/>
    <text x="575" y="400" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">RefreshTokens</text>
    
    <text x="460" y="420" font-family="Arial" font-size="10" font-weight="bold">🔑 Id: integer (PK)</text>
    <text x="460" y="440" font-family="Arial" font-size="10" font-weight="bold">🔗 UserId: integer (FK)</text>
    <text x="460" y="460" font-family="Arial" font-size="10">Token: varchar</text>
    <text x="460" y="480" font-family="Arial" font-size="10">ExpiryDate: timestamp</text>
    <text x="460" y="500" font-family="Arial" font-size="10">IsRevoked: boolean</text>
    <text x="460" y="520" font-family="Arial" font-size="10">CreatedAt: timestamp</text>
  </g>

  <g id="passwordresettokens-table">
    <rect x="450" y="580" width="250" height="150" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <rect x="450" y="580" width="250" height="30" fill="#f44336"/>
    <text x="575" y="600" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">PasswordResetTokens</text>
    
    <text x="460" y="620" font-family="Arial" font-size="10" font-weight="bold">🔑 Id: integer (PK)</text>
    <text x="460" y="640" font-family="Arial" font-size="10" font-weight="bold">🔗 UserId: integer (FK)</text>
    <text x="460" y="660" font-family="Arial" font-size="10">Token: varchar</text>
    <text x="460" y="680" font-family="Arial" font-size="10">ExpiryDate: timestamp</text>
    <text x="460" y="700" font-family="Arial" font-size="10">IsUsed: boolean</text>
    <text x="460" y="720" font-family="Arial" font-size="10">CreatedAt: timestamp</text>
  </g>

  <g id="migrations-table">
    <rect x="800" y="50" width="250" height="100" fill="#f5f5f5" stroke="#757575" stroke-width="2"/>
    <rect x="800" y="50" width="250" height="30" fill="#757575"/>
    <text x="925" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">__EFMigrationsHistory</text>
    
    <text x="810" y="90" font-family="Arial" font-size="10" font-weight="bold">🔑 MigrationId: varchar (PK)</text>
    <text x="810" y="110" font-family="Arial" font-size="10">ProductVersion: varchar</text>
  </g>

  <line x1="350" y1="200" x2="450" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="380" y="140" font-family="Arial" font-size="9" fill="#333">1:M</text>

  <line x1="200" y1="550" x2="200" y2="600" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="170" y="580" font-family="Arial" font-size="9" fill="#333">1:M</text>

  <line x1="300" y1="350" x2="350" y2="350" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="350" x2="350" y2="680" stroke="#333" stroke-width="2"/>
  <line x1="350" y1="680" x2="350" y2="680" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="350" y1="250" x2="450" y2="440" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="380" y="340" font-family="Arial" font-size="9" fill="#333">1:M</text>

  <line x1="350" y1="300" x2="450" y2="640" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="380" y="470" font-family="Arial" font-size="9" fill="#333">1:M</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <g id="legend">
    <rect x="800" y="200" width="300" height="160" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
    <text x="950" y="220" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Legenda</text>
    
    <text x="810" y="240" font-family="Arial" font-size="10">🔑 = Primarni ključ (PK)</text>
    <text x="810" y="255" font-family="Arial" font-size="10">🔗 = Strani ključ (FK)</text>
    <text x="810" y="270" font-family="Arial" font-size="10">1:M = Veza jedan prema više</text>
    
    <line x1="810" y1="285" x2="830" y2="285" stroke="#4caf50" stroke-width="2"/>
    <text x="835" y="290" font-family="Arial" font-size="9">Member polja</text>
    
    <line x1="810" y1="300" x2="830" y2="300" stroke="#ff9800" stroke-width="2"/>
    <text x="835" y="305" font-family="Arial" font-size="9">Trainer polja</text>
    
    <line x1="810" y1="315" x2="830" y2="315" stroke="#9c27b0" stroke-width="2"/>
    <text x="835" y="320" font-family="Arial" font-size="9">Personnel polja</text>
    
    <text x="810" y="340" font-family="Arial" font-size="9">Users tablica koristi TPH</text>
    <text x="810" y="355" font-family="Arial" font-size="9">(Table Per Hierarchy) pristup</text>
  </g>
</svg>