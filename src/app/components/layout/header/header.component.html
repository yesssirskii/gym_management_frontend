<div class="header">
    <div class="header-left">
    <h3>{{ 'APP.TITLE' | translate }}</h3>
    </div>
    
    <div class="header-right">
        <p-button 
            icon="pi pi-user" 
            [label]="'HEADER.PROFILE' | translate"
            severity="secondary"
            (onClick)="showUserProfile()"
            [outlined]="true"
            class="mr-2">
        </p-button>
        
        <p-button 
            icon="pi pi-sign-out" 
            [label]="'HEADER.LOGOUT' | translate"
            severity="danger"
            (onClick)="logout()"
            [outlined]="true">
        </p-button>
    </div>
</div>
    
<app-user-profile-dialog 
    [(visible)]="userProfileVisible"
    [user]="currentUser">
</app-user-profile-dialog>
